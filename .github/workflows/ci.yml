name: CI

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - master
      - fix-mllp

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.0
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake
